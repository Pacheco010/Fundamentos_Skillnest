<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectores Avanzados</title>
    <!-- Color de sitio Web -->
    <meta name="author" content="Leonardo Pacheco">
    <!-- Link hacia hoja de estilos-->
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <header class="header">
        <img src="static/images/logo.png" alt="Logo">
        <h1 id="red" class="green"> Hola, CSS!</h1>
        <main>
            <div class="quote">
                <p> "Un gran poder Conlleva una Gran Responsabilidad" </p>
                <h4>Tio Ben</h4>
            </div>
            <div id="container">
                <p class="highlight">Este es un párrafo resaltado.</p>
                <p>Este es un párrafo dentro del contenedor.</p>
            </div>
            <form>
                <input type="text" name="username" placeholder="Escribe tu nombre">
                <input type="submit" value="Enviar">
            </form>
            <hr>
            <div>
                <h3>Colores</h3>
                <p class="color_nombre">Color por Nombre</p>
                <p class="color_rgb">Color por Formato RGB</p>
                <p class="color_hex">Color por Formato Hexadecimal</p>
            </div>

            
        </main>
    </header>
    <script src="static/js/script.js"></script>
</body>

</html>
