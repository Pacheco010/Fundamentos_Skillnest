<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
</head>

<body> <!-- Cuerpo Del Documento -->
    <header> <!-- Encabezado del Documento-->
        <h1>Iniciar sesión</h1>
        <nav> <!-- Barra De Navegación con Enlaces -->
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Nosotros</a></li>
                <li><a href="#">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main> <!-- Seccion Principal de la Pagina-->
        <section>
            <article> <!-- Articulo con informacion Epecifica-->
                <h2> Hola Soy un Articulo</h2>
                <hr>
                <p> Parrafo de Un Articulo</p>
            </article>
        </section>
        <section> <!-- Contenedor al igual que un Div-->
            <h2>Acceso a la cuenta</h2>

            <form action="/login" method="post">
                <div>
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div>
                    <input type="checkbox" id="recordarme" name="recordarme">
                    <label for="recordarme">Recordarme</label>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </section>
    </main>
    <footer style="text-align: center;">
        <hr>
        <p>Todos los Derechos Reservados.</p>
    </footer>
</body>

</html>
