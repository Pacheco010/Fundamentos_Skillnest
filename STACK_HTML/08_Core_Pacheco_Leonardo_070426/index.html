<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Discord</title>
</head>

<body>

    <h1>Crear una cuenta en Discord</h1>

    <form action="#" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
        </div>
        <br>

        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
        </div>
        <br>

        <div>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
        </div>
        <br>

        <div>
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <br>

        <div>
            <label for="confirm_password">Confirmar contraseña:</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <br>

        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
        </div>
        <br>

        <fieldset style="border: none; padding: 0; margin: 0;">
            <legend>Género:</legend>
            <input type="radio" id="masculino" name="genero" value="masculino" required>
            <label for="masculino">Masculino</label>

            <input type="radio" id="femenino" name="genero" value="femenino">
            <label for="femenino">Femenino</label>

            <input type="radio" id="otro" name="genero" value="otro">
            <label for="otro">Prefiero no decirlo</label>
        </fieldset>
        <br>

        <div>
            <label for="descripcion">Descripción sobre ti:</label><br>
            <textarea id="descripcion" name="descripcion" rows="5" cols="40"></textarea>
        </div>
        <br>

        <div>
            <label for="intereses">Selecciona tus intereses:</label><br>
            <select id="intereses" name="intereses" size="4">
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deportes</option>
                <option value="tecnologia">Tecnología</option>
            </select>
        </div>
        <br>

        <div>
            <input type="checkbox" id="terminos" name="terminos" required>
            <label for="terminos">Al registrarte, aceptas los <a href="#">Términos y condiciones</a> de Discord.</label>
        </div>
        <br>

        <div>
            <input type="submit" value="Registrarse">
        </div>
    </form>

</body>

</html>
